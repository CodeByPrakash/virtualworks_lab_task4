<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Mindful Clarity - Daily Inspiration</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,600;1,600&amp;family=Hanken+Grotesk:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<!-- Icons -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-tertiary-container": "#f6f3f3",
                        "surface-dim": "#dadada",
                        "on-error-container": "#93000a",
                        "on-background": "#1a1c1c",
                        "inverse-on-surface": "#f0f1f1",
                        "secondary": "#5f5e5c",
                        "surface": "#f9f9f9",
                        "background": "#f9f9f9",
                        "primary": "#455a65",
                        "on-primary": "#ffffff",
                        "outline-variant": "#c2c7cb"
                    },
                    "fontFamily": {
                        "display-quote-mobile": ["Playfair Display"],
                        "button-text": ["Hanken Grotesk"],
                        "display-quote": ["Playfair Display"],
                        "body-md": ["Hanken Grotesk"],
                        "label-caps": ["Hanken Grotesk"],
                        "attribution": ["Hanken Grotesk"],
                        "body-lg": ["Hanken Grotesk"]
                    }
                },
            },
        }
</script>
<style>
    .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
    }
    .quote-card-shadow {
        box-shadow: 0 8px 24px rgba(69, 90, 101, 0.08);
    }
    .backdrop-blur-nav {
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }
    body {
      min-height: max(884px, 100dvh);
    }
</style>
</head>
<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md overflow-x-hidden">
<!-- TopAppBar -->
<header class="bg-surface sticky top-0 z-50 flex justify-center items-center px-6 w-full py-4 shadow-sm">
    <h1 class="font-display-quote text-primary tracking-tight text-xl md:text-2xl">Mindful Clarity</h1>
</header>

<main class="flex-1 flex flex-col items-center px-6 pt-8 max-w-4xl mx-auto w-full">
    <!-- Hero Quote Section -->
    <section class="w-full flex-1 flex flex-col justify-center items-center py-12">
        <div class="bg-white p-10 md:p-14 rounded-xl quote-card-shadow w-full max-w-2xl transition-all duration-500" id="quote-card">
            <div class="flex flex-col items-center text-center space-y-8">
                <span class="material-symbols-outlined text-primary opacity-20 text-4xl mb-2">format_quote</span>
                <blockquote id="quote-text" class="font-display-quote-mobile md:font-display-quote text-2xl md:text-3xl text-on-surface leading-tight italic">
                    Loading your daily inspiration...
                </blockquote>
                <cite id="quote-author" class="not-italic font-attribution text-lg text-secondary mt-8 block">
                    — Please wait
                </cite>
            </div>
        </div>
        <div class="mt-8 w-full flex justify-center">
            <button class="bg-primary text-white font-button-text px-8 py-4 rounded-full shadow-md hover:opacity-90 active:scale-95 transition-all flex items-center gap-2 group disabled:opacity-50" id="generate-btn">
                <span class="material-symbols-outlined group-hover:rotate-180 transition-transform duration-500">auto_awesome</span>
                Generate New Quote
            </button>
        </div>
    </section>

    <!-- History Section -->
    <section class="w-full pb-32 mt-8">
        <div class="flex items-center justify-between mb-4">
            <h2 class="font-label-caps text-xs text-primary uppercase tracking-widest font-bold">History</h2>
        </div>
        <div id="history-container" class="space-y-2 flex flex-col">
            <!-- History items will be loaded here dynamically -->
            <div class="text-secondary text-sm italic">No history yet...</div>
        </div>
    </section>
</main>

<!-- Visual Polish: Soft Ambient Background -->
<div class="fixed inset-0 pointer-events-none -z-10 opacity-30">
    <div class="absolute top-[-10%] left-[-10%] w-[50%] h-[50%] bg-[#cfe6f3] rounded-full blur-[120px]"></div>
    <div class="absolute bottom-[-5%] right-[-5%] w-[40%] h-[40%] bg-[#e5e2df] rounded-full blur-[100px]"></div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const generateBtn = document.getElementById('generate-btn');
        const quoteCard = document.getElementById('quote-card');
        const quoteText = document.getElementById('quote-text');
        const quoteAuthor = document.getElementById('quote-author');
        const historyContainer = document.getElementById('history-container');

        // Fetch initial quote and history
        fetchNewQuote();
        fetchHistory();

        generateBtn.addEventListener('click', () => {
            fetchNewQuote();
        });

        async function fetchNewQuote() {
            generateBtn.disabled = true;
            
            // Visual feedback fade out
            quoteCard.style.opacity = '0';
            quoteCard.style.transform = 'translateY(10px)';
            
            try {
                const response = await fetch('/api/quote');
                if (response.ok) {
                    const data = await response.json();
                    
                    setTimeout(() => {
                        quoteText.innerText = `"${data.text}"`;
                        quoteAuthor.innerText = `— ${data.author}`;
                        
                        // Visual feedback fade in
                        quoteCard.style.opacity = '1';
                        quoteCard.style.transform = 'translateY(0)';
                        
                        // Update history list after getting new quote
                        fetchHistory();
                    }, 300);
                } else {
                    quoteText.innerText = "Failed to fetch a new quote.";
                    quoteAuthor.innerText = "";
                    quoteCard.style.opacity = '1';
                    quoteCard.style.transform = 'translateY(0)';
                }
            } catch (error) {
                console.error('Error fetching quote:', error);
                quoteText.innerText = "Network error. Please try again later.";
                quoteAuthor.innerText = "";
                quoteCard.style.opacity = '1';
                quoteCard.style.transform = 'translateY(0)';
            } finally {
                generateBtn.disabled = false;
            }
        }

        async function fetchHistory() {
            try {
                const response = await fetch('/api/history');
                if (response.ok) {
                    const history = await response.json();
                    renderHistory(history);
                }
            } catch (error) {
                console.error('Error fetching history:', error);
            }
        }

        function renderHistory(history) {
            if (history.length === 0) {
                historyContainer.innerHTML = '<div class="text-secondary text-sm italic">No history yet...</div>';
                return;
            }

            historyContainer.innerHTML = '';
            
            history.forEach(item => {
                const div = document.createElement('div');
                div.className = 'group flex items-center justify-between p-4 bg-[#f3f3f4] hover:bg-[#eeeeee] transition-colors rounded-lg border-b border-outline-variant/10';
                
                div.innerHTML = `
                    <div class="flex-1 pr-4">
                        <p class="font-display-quote text-base text-on-surface line-clamp-1 italic">"${escapeHTML(item.text)}"</p>
                        <p class="font-attribution text-xs text-secondary mt-1">${escapeHTML(item.author)}</p>
                    </div>
                `;
                
                historyContainer.appendChild(div);
            });
        }

        function escapeHTML(str) {
            return str.replace(/[&<>'"]/g, 
                tag => ({
                    '&': '&amp;',
                    '<': '&lt;',
                    '>': '&gt;',
                    "'": '&#39;',
                    '"': '&quot;'
                }[tag] || tag)
            );
        }
    });
</script>
</body></html>
